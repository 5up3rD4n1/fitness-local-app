flux:
  # Options: flux1-dev (non-commercial), flux1-schnell (Apache 2.0 commercial)
  model: flux1-dev
  steps: 28
  guidance: 3.5
  resolution: [1024, 1024]
  lora:
    style:
      name: lnart_style_v1
      strength: 1.0
      trigger_word: "LNART_STYLE"
  seed: -1  # -1 = random per generation; fix for reproducibility

controlnet:
  type: openpose
  model: shakker-labs/flux-controlnet-union-pro
  strength: 0.75

character_consistency:
  method: pulid  # alternatives: ip-adapter, reference-only
  reference_image: character_ref.png
  strength: 0.6

ollama:
  host: http://localhost:11434
  orchestrator_model: qwen2.5:32b
  vision_model: llama3.2-vision:11b
  max_retries: 3
  temperature: 0.4

comfyui:
  host: http://localhost:8188
  workflow_path: workflows/flux_openpose.json

composition:
  canvas_size: [1200, 900]
  bg_color: "#FAFAFA"
  text_color_reps: "#000000"
  text_color_sets: "#D32F2F"
  font_path: fonts/Roboto-Bold.ttf
  reps_font_size: 64
  sets_font_size: 64
  pose_spacing: 60  # px between the two poses
  pose_max_height: 600

output:
  raw_dir: raw_poses
  approved_dir: approved_poses
  final_dir: final
  format: png
  cdn_upload: false  # set true and configure if you want auto-upload

logging:
  level: INFO
  file: pipeline.log
